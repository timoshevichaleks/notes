services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ainotes-pg-compose
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ainotes
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: ainotes-redis-compose
    ports:
      - '6379:6379'

  api:
    build: ./api
    container_name: ainotes-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ainotes?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-change-me
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
